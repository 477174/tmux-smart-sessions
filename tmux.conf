# ══════════════════════════════════════════════════════════════
#  tmux-smart-sessions — tmux.conf
#  Append or source this from your existing ~/.tmux.conf
# ══════════════════════════════════════════════════════════════

# ── Prefix: Ctrl+A ───────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Session picker (sesh-picker) ─────────────────────────────
bind-key "f" display-popup -h 80% -w 60% -E "$HOME/.local/bin/sesh-picker"

# ── Windows (tabs) ────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-n next-window
bind -n M-p previous-window

# ── Panes (splits) ───────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Resize panes ──────────────────────────────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Quality of life ──────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Status bar (catppuccin-inspired) ─────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e] "
set -g status-left-length 30
set -g status-right "#[fg=#a6adc8] %H:%M  %d/%m "
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Reload config ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Plugins (TPM) ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum: auto-save every 15min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Resurrect: save pane contents and processes
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Strip ephemeral sessions from save files
set -g @resurrect-hook-post-save-layout '~/.local/bin/resurrect-strip-ephemeral'

# TPM must be last line
run '~/.tmux/plugins/tpm/tpm'
